<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selector</title>
    <style>
        h2,h4{
            margin:5px;
            padding:5px;
            background-color:aquamarine;
            color:blue;
        }
        h1,h3,p{
            color:crimson;
        }
        /* Targets elements under another elements-descendent  */
        div p{
            margin:0;
            padding:0;
            color:brown;
        }
    </style>
</head>
<body>
    <h1>Heading 1</h1>
    <div>
        <p>Paragraph 1</p>
        <p>Paragraph 2</p>
    </div>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
</body>
</html>
